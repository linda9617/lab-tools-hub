<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab Tools Hub</title>
<style>
:root{--bg:#f0f4f8;--surface:#fff;--border:#d0d7e3;--primary:#1e4d8c;--primary-lt:#e8eef7;--primary-dk:#163a6b;--text:#1a2b3c;--muted:#6b7a8d;--green:#1a7a6e;--green-lt:#e2f5f3}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── Header ── */
header{background:var(--primary);color:#fff;padding:16px 28px 13px;box-shadow:0 2px 12px rgba(0,0,0,.24)}
.hdr-inner{max-width:900px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:10px}
.hdr-title{display:flex;align-items:center;gap:12px}
.hdr-logo{width:36px;height:36px;background:rgba(255,255,255,.18);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
header h1{font-size:1.6rem;font-weight:700;letter-spacing:-.01em}
header .sub{font-size:.8rem;opacity:.68;margin-top:3px}
header .author{font-size:.78rem;opacity:.56;align-self:flex-end}

/* ── Main ── */
main{max-width:900px;margin:0 auto;padding:26px 18px 100px;display:flex;flex-direction:column;gap:18px}

/* ── Card shell ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,.07);padding:20px 24px}

/* ── Per-card action buttons ── */
.card-actions{margin-top:4px;display:flex;gap:7px;flex-wrap:wrap}
.card-actions .btn-v{flex:1;text-align:center}

/* ── Filter bar ── */
.filter-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:180px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted)}
.search-input{width:100%;padding:8px 12px 8px 34px;border:1px solid var(--border);border-radius:8px;font-size:.87rem;background:var(--surface);color:var(--text);transition:border-color .15s,box-shadow .15s}
.search-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(30,77,140,.10)}
.cat-chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:5px 13px;border:1px solid var(--border);border-radius:20px;font-size:.8rem;font-weight:500;background:var(--surface);color:var(--muted);cursor:pointer;transition:all .14s;white-space:nowrap}
.chip.active{background:var(--primary);border-color:var(--primary);color:#fff}
.chip:not(.active):hover{background:var(--primary-lt);border-color:var(--primary);color:var(--primary)}

/* ── Tool grid ── */
.tool-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px}
.tool-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 22px 17px;box-shadow:0 2px 8px rgba(0,0,0,.07);display:flex;flex-direction:column;gap:11px;transition:box-shadow .2s,translate .15s}
.tool-card:hover{box-shadow:0 7px 24px rgba(30,77,140,.14);translate:0 -2px}
.tool-card.hidden{display:none}
.card-top{display:flex;gap:13px;align-items:flex-start}
.tool-icon{width:44px;height:44px;border-radius:10px;background:var(--primary-lt);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--primary)}
.tool-name{font-size:.97rem;font-weight:700;line-height:1.2;margin-bottom:4px}
.tool-cat{display:inline-block;font-size:.71rem;font-weight:600;color:var(--primary);background:var(--primary-lt);border-radius:4px;padding:2px 7px;letter-spacing:.01em}
.tool-desc{font-size:.83rem;color:var(--muted);line-height:1.58}
.card-tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:.72rem;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:2px 7px;color:var(--muted)}
.btn-v{padding:6px 14px;border:none;border-radius:7px;font-size:.82rem;font-weight:600;cursor:pointer;transition:background .14s,box-shadow .14s,translate .1s}
.btn-v:hover{translate:0 -2px}
.btn-v:active{translate:0 1px;box-shadow:none!important}
.btn-pub{background:var(--primary);color:#fff;box-shadow:0 2px 6px rgba(30,77,140,.26)}
.btn-pub:hover{background:var(--primary-dk);box-shadow:0 5px 12px rgba(30,77,140,.35)}
.btn-local{background:var(--green);color:#fff;box-shadow:0 2px 6px rgba(26,122,110,.22)}
.btn-local:hover{background:#155f55;box-shadow:0 5px 12px rgba(26,122,110,.32)}

/* No results */
.no-results{display:none;text-align:center;padding:52px 20px;color:var(--muted);font-size:.92rem}
.no-results svg{display:block;margin:0 auto 12px;opacity:.35}

/* ── Footer ── */
.copyright{position:fixed;bottom:0;left:0;right:0;text-align:center;font-size:.75rem;color:var(--muted);background:rgba(240,244,248,.95);backdrop-filter:blur(4px);padding:7px 12px;border-top:1px solid var(--border);z-index:100}

@media(max-width:520px){
  .tool-grid{grid-template-columns:1fr}
  .hdr-inner{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>

<header>
  <div class="hdr-inner">
    <div class="hdr-title">
      <div class="hdr-logo">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="10" cy="10" r="8"/>
          <path d="M6 10 Q8 6 10 10 Q12 14 14 10"/>
          <line x1="2" y1="10" x2="18" y2="10" stroke-dasharray="2 2" stroke-width="1"/>
        </svg>
      </div>
      <div>
        <h1>Lab Tools Hub</h1>
        <p class="sub">Biology data processing &amp; automation tools</p>
      </div>
    </div>
    <span class="author">by ILYH</span>
  </div>
</header>

<main>

  <!-- Filter bar -->
  <div class="filter-bar">
    <div class="search-wrap">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="6.5" cy="6.5" r="5"/><line x1="10.5" y1="10.5" x2="15" y2="15"/></svg>
      <input class="search-input" id="searchInput" type="text" placeholder="Search tools…">
    </div>
    <div class="cat-chips" id="catChips">
      <button class="chip active" data-cat="all">All</button>
      <button class="chip" data-cat="data">Data</button>
      <button class="chip" data-cat="plate">Plate</button>
      <button class="chip" data-cat="analysis">Analysis</button>
      <button class="chip" data-cat="automation">Automation</button>
    </div>
  </div>

  <!-- Tool grid -->
  <div class="tool-grid" id="toolGrid"></div>
  <div class="no-results" id="noResults">
    <svg width="40" height="40" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="18" cy="18" r="14"/><line x1="27" y1="27" x2="38" y2="38"/><line x1="12" y1="18" x2="24" y2="18"/></svg>
    No tools match your search.
  </div>

</main>

<footer class="copyright">Copyright &copy; 2026 ILYH. All rights reserved.</footer>

<script>
// ── Tool definitions ──────────────────────────────────────────────────────────
const TOOLS = [
  {
    id: 'prism',
    name: 'Data Easy to Prism',
    cat: 'data',
    catLabel: 'Data Conversion',
    desc: 'Convert tabular or matrix data (CSV / Excel) into GraphPad Prism-ready TSV format. Supports XY, Column, Grouped, and Survival table types with live chart preview.',
    tags: ['Prism', 'CSV', 'Excel', 'TSV'],
    icon: `<svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="2" width="18" height="18" rx="2.5"/>
      <line x1="2" y1="7.5" x2="20" y2="7.5"/>
      <line x1="2" y1="13" x2="20" y2="13"/>
      <line x1="7.5" y1="2" x2="7.5" y2="20"/>
    </svg>`,
    urls: {
      public: 'https://linda9617.github.io/data-easy-to-prism/',
      local:  'data-easy-to-prism/data-easy-to-prism.html'
    }
  },
  {
    id: 'plate',
    name: 'Plate Map ↔ List Converter',
    cat: 'plate',
    catLabel: 'Plate Tools',
    desc: 'Bidirectional conversion between well-plate map format and assay list format. Supports 96 / 384-well plates and custom template mapping.',
    tags: ['Plate Map', 'Well List', '96-well', '384-well'],
    icon: `<svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round">
      <rect x="2" y="2" width="18" height="18" rx="3"/>
      <circle cx="7"  cy="7"  r="1.3" fill="currentColor" stroke="none"/>
      <circle cx="11" cy="7"  r="1.3" fill="currentColor" stroke="none"/>
      <circle cx="15" cy="7"  r="1.3" fill="currentColor" stroke="none"/>
      <circle cx="7"  cy="11" r="1.3" fill="currentColor" stroke="none"/>
      <circle cx="11" cy="11" r="1.3" fill="currentColor" stroke="none"/>
      <circle cx="15" cy="11" r="1.3" fill="currentColor" stroke="none"/>
      <circle cx="7"  cy="15" r="1.3" fill="currentColor" stroke="none"/>
      <circle cx="11" cy="15" r="1.3" fill="currentColor" stroke="none"/>
      <circle cx="15" cy="15" r="1.3" fill="currentColor" stroke="none"/>
    </svg>`,
    urls: {
      public: 'https://linda9617.github.io/plate-map-list-converter/',
      local:  'plate-map-list-converter/Plate_vs_List.html'
    }
  },
  {
    id: 'qpcr',
    name: 'qPCR Analysis Tool',
    cat: 'analysis',
    catLabel: 'Analysis',
    desc: 'Analyse qPCR data using the ΔΔCt method with automatic reference gene normalization. Accepts Excel/CSV input and exports results with bar chart visualizations.',
    tags: ['qPCR', 'Gene Expression', 'ΔΔCt', 'Normalization'],
    icon: `<svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <line x1="2" y1="20" x2="20" y2="20"/>
      <line x1="2" y1="20" x2="2"  y2="3"/>
      <polyline points="2,17 5,17 7,9 9,13 11,7 13,15 15,11 17,14 20,14"/>
    </svg>`,
    urls: {
      public: 'https://linda9617.github.io/qpcr-analysis-tool/',
      local:  'qpcr-analysis-tool/qpcr-analysis-tool.html'
    }
  },
  {
    id: 'tecan',
    name: 'Tecan FCA Worklist Generator',
    cat: 'automation',
    catLabel: 'Automation',
    desc: 'Generate Tecan FCA-compatible worklists from plate map inputs. Configure source/destination labware, transfer volumes, and export CSV for direct instrument use.',
    tags: ['Tecan', 'Worklist', 'Liquid Handling', 'FCA'],
    icon: `<svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8.5 3 L8.5 11.5 L5.5 15.5 L5.5 19 L16.5 19 L16.5 15.5 L13.5 11.5 L13.5 3 Z"/>
      <line x1="8.5" y1="8.5" x2="13.5" y2="8.5"/>
      <line x1="6.5" y1="17" x2="15.5" y2="17"/>
    </svg>`,
    urls: {
      public: 'https://linda9617.github.io/tecan-fca-worklist-generator/',
      local:  'tecan-fca-worklist-generator/Tecan_Worklist_Generator.html'
    }
  }
];

let currentCat = 'all';
let searchText = '';

// ── Build cards ───────────────────────────────────────────────────────────────
function buildCards() {
  const grid = document.getElementById('toolGrid');
  grid.innerHTML = '';
  TOOLS.forEach(tool => {
    const card = document.createElement('div');
    card.className = 'tool-card';
    card.dataset.cat  = tool.cat;
    card.dataset.name = (tool.name + ' ' + tool.tags.join(' ') + ' ' + tool.desc).toLowerCase();
    card.innerHTML = `
      <div class="card-top">
        <div class="tool-icon">${tool.icon}</div>
        <div>
          <div class="tool-name">${tool.name}</div>
          <span class="tool-cat">${tool.catLabel}</span>
        </div>
      </div>
      <div class="tool-desc">${tool.desc}</div>
      <div class="card-tags">${tool.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      <div class="card-actions">
        <button class="btn-v btn-pub"   data-id="${tool.id}" data-ver="public">Github</button>
        <button class="btn-v btn-local" data-id="${tool.id}" data-ver="local">Download</button>
      </div>`;
    grid.appendChild(card);
  });
  grid.querySelectorAll('.btn-v').forEach(btn => {
    btn.addEventListener('click', () => launch(btn.dataset.id, btn.dataset.ver));
  });
  applyFilter();
}

// ── Launch / download ─────────────────────────────────────────────────────────
function launch(id, ver) {
  const tool = TOOLS.find(t => t.id === id);
  if (!tool) return;
  const url = tool.urls[ver];
  if (ver === 'local') {
    const a = document.createElement('a');
    a.href = url;
    a.download = url.split('/').pop();
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  } else {
    window.open(url, '_blank', 'noopener,noreferrer');
  }
}

// ── Filter ────────────────────────────────────────────────────────────────────
function applyFilter() {
  const cards = document.querySelectorAll('.tool-card');
  let visible = 0;
  cards.forEach(card => {
    const catOk  = currentCat === 'all' || card.dataset.cat === currentCat;
    const textOk = !searchText || card.dataset.name.includes(searchText);
    const show   = catOk && textOk;
    card.classList.toggle('hidden', !show);
    if (show) visible++;
  });
  document.getElementById('noResults').style.display = visible === 0 ? '' : 'none';
}

// ── Event listeners ───────────────────────────────────────────────────────────
document.getElementById('catChips').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  currentCat = chip.dataset.cat;
  document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c === chip));
  applyFilter();
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchText = e.target.value.trim().toLowerCase();
  applyFilter();
});

// ── Init ──────────────────────────────────────────────────────────────────────
buildCards();
</script>
</body>
</html>
