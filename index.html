<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILYH's Lab Magic Hub</title>
<style>
:root{
  --bg:#f7f8fa;
  --surface:#fff;
  --line:#e6e9ee;
  --line-soft:#f0f2f5;
  --text:#1a2332;
  --muted:#6b7280;
  --primary:#1e4d8c;
  --primary-soft:#eef3fa;
  --primary-dk:#163a6b;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}

/* Blue sticky top bar — Back to nothing here (this IS the hub), shows author + condensed title on scroll */
.top{background:var(--primary);color:#e6eef9;border-bottom:1px solid #163a6b;position:sticky;top:0;z-index:50}
.top-inner{max-width:1100px;margin:0 auto;padding:0 28px;display:flex;align-items:center;gap:16px;min-height:52px;position:relative}
.top-title{position:absolute;left:28px;right:120px;top:0;height:52px;line-height:52px;font-family:"Source Serif Pro",Charter,Georgia,serif;font-size:1.2rem;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.005em;opacity:0;margin:0;text-rendering:optimizeLegibility;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;pointer-events:none;transition:opacity .2s ease}
.top.condensed .top-title{opacity:1}
.top .author{color:#cfd9e8;font-size:.76rem;letter-spacing:.04em;position:absolute;right:28px;top:50%;transform:translateY(-50%);pointer-events:none}

/* Hero — white, NOT sticky */
.hero{background:#fff;border-bottom:1px solid var(--line)}
.hero-inner{max-width:1100px;margin:0 auto;padding:64px 32px 48px}
.hero h1{font-family:"Source Serif Pro","Charter","Iowan Old Style",Georgia,serif;font-size:2.45rem;font-weight:600;letter-spacing:-.014em;line-height:1.16;margin-bottom:14px;color:var(--text);text-rendering:optimizeLegibility;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
.hero .lede{font-size:1rem;color:var(--muted);max-width:680px;line-height:1.65}

/* Main */
main{max-width:1100px;margin:0 auto;padding:40px 32px 80px;display:flex;flex-direction:column;gap:26px}

/* Filter bar */
.filter-bar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-top:-6px}
.search-wrap{position:relative;flex:1;min-width:220px;max-width:360px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted)}
.search-input{width:100%;padding:10px 14px 10px 36px;border:1px solid var(--line);border-radius:8px;font-size:.88rem;font-family:inherit;background:var(--surface);color:var(--text);transition:border-color .15s,box-shadow .15s}
.search-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(30,77,140,.12)}
.cat-chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:6px 14px;border:1px solid var(--line);border-radius:20px;font-size:.81rem;font-weight:500;font-family:inherit;background:var(--surface);color:var(--muted);cursor:pointer;transition:all .14s;white-space:nowrap}
.chip.active{background:var(--primary);border-color:var(--primary);color:#fff}
.chip:not(.active):hover{background:var(--primary-soft);border-color:var(--primary);color:var(--primary)}

/* Tool grid */
.tool-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.tool-card{background:var(--surface);border:1px solid var(--line-soft);border-radius:14px;padding:22px 24px 18px;display:flex;flex-direction:column;gap:12px;position:relative;overflow:hidden;transition:border-color .18s,box-shadow .18s,translate .18s}
.tool-card:hover{border-color:var(--line);box-shadow:0 4px 16px rgba(30,77,140,.08);translate:0 -2px}
.tool-card.clickable{cursor:pointer}
.tool-card.clickable:hover{border-color:var(--primary)}
.tool-card.clickable:active{background:var(--primary-soft);transition:none}
.tool-card.hidden{display:none}
.card-top{display:flex;gap:14px;align-items:flex-start}
.tool-icon{width:46px;height:46px;border-radius:11px;background:var(--primary-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--primary);border:1px solid #dde7f4}
.tool-name{font-family:"Source Serif Pro",Charter,Georgia,serif;font-size:1.22rem;font-weight:700;color:var(--text);line-height:1.3;letter-spacing:0;text-rendering:optimizeLegibility;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;margin-bottom:5px}
.tool-name a{color:inherit;text-decoration:none}
.tool-cat{display:inline-block;font-size:.7rem;font-weight:600;color:var(--primary);background:var(--primary-soft);border-radius:4px;padding:2px 8px;letter-spacing:.04em;text-transform:uppercase}
.tool-desc{font-size:.86rem;color:var(--muted);line-height:1.62;height:78px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.card-tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:.72rem;background:var(--bg);border:1px solid var(--line-soft);border-radius:4px;padding:2px 8px;color:var(--muted)}

/* Buttons — three-tier hierarchy from info-page (uniform width, calmer than before) */
.card-actions{margin-top:6px;display:flex;gap:8px;flex-wrap:wrap}
.btn-v{flex:1;min-width:90px;text-align:center;font-family:inherit;font-size:.82rem;font-weight:600;line-height:1;cursor:pointer;border:1px solid transparent;padding:10px 14px;border-radius:8px;transition:all .15s}
.btn-pub{background:var(--primary);color:#fff;box-shadow:0 1px 2px rgba(30,77,140,.18)}
.btn-pub:hover{background:var(--primary-dk);box-shadow:0 3px 8px rgba(30,77,140,.24)}
.btn-pub:active{translate:0 1px}
.btn-local{background:transparent;color:var(--muted);border-color:transparent}
.btn-local:hover{color:var(--text);background:var(--line-soft)}
.btn-local:active{color:var(--primary)}
.btn-info{background:transparent;color:var(--primary);border-color:var(--primary);text-decoration:none}
.btn-info:hover{background:var(--primary-soft)}
.btn-info:active{background:var(--primary);color:#fff}
.btn-v:disabled{opacity:.5;cursor:wait}

/* No results */
.no-results{display:none;text-align:center;padding:52px 20px;color:var(--muted);font-size:.92rem;background:var(--surface);border:1px dashed var(--line);border-radius:14px}
.no-results svg{display:block;margin:0 auto 12px;opacity:.35}

/* Footer — non-sticky, matches info pages */
footer{max-width:1100px;margin:0 auto;padding:28px 32px;border-top:1px solid var(--line);color:var(--muted);font-size:.78rem;text-align:center}

@media (max-width:680px){
  .top-title{display:none}
  .hero-inner{padding:42px 22px 36px}
  .hero h1{font-size:1.85rem}
  main{padding:32px 22px 60px}
  .tool-grid{grid-template-columns:1fr}
  .card-actions{flex-direction:column}
  .btn-v{flex:none}
}
</style>
</head>

let currentCat = 'all';
let searchText = '';

function buildCards() {
  const grid = document.getElementById('toolGrid');
  grid.innerHTML = '';
  TOOLS.forEach(tool => {
    const card = document.createElement('div');
    card.className = 'tool-card';
    card.dataset.cat  = tool.cat;
    card.dataset.name = (tool.name + ' ' + tool.catLabel + ' ' + tool.tags.join(' ') + ' ' + tool.desc).toLowerCase();
    if (tool.info) { card.dataset.info = tool.info; card.classList.add('clickable'); }
    card.innerHTML = `
      <div class="card-top">
        <div class="tool-icon" aria-hidden="true">${tool.icon}</div>
        <div>
          <div class="tool-name">${tool.name}</div>
          <span class="tool-cat">${tool.catLabel}</span>
        </div>
      </div>
      <div class="tool-desc">${tool.desc}</div>
      <div class="card-tags">${tool.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      <div class="card-actions">
        ${tool.info ? `<a href="${tool.info}" class="btn-v btn-info">Overview</a>` : ''}
        <button type="button" class="btn-v btn-pub" data-id="${tool.id}" data-ver="public">Run on GitHub</button>
        <button type="button" class="btn-v btn-local" data-id="${tool.id}" data-ver="local">Download</button>
      </div>`;
    grid.appendChild(card);
  });
  grid.querySelectorAll('.btn-v').forEach(btn => {
    btn.addEventListener('click', () => launch(btn.dataset.id, btn.dataset.ver));
  });
  grid.querySelectorAll('.tool-card.clickable').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('.card-actions') || e.target.closest('a')) return;
      window.location.href = card.dataset.info;
    });
  });
  applyFilter();
}

function launch(id, ver) {
  const tool = TOOLS.find(t => t.id === id);
  if (!tool) return;
  const url = tool.urls[ver];
  if (ver === 'local') {
    const btn = document.querySelector(`.btn-local[data-id="${id}"]`);
    if (btn) { btn.textContent = 'Downloading…'; btn.disabled = true; }
    fetch(url)
      .then(r => { if (!r.ok) throw new Error(r.status); return r.blob(); })
      .then(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = tool.filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(a.href), 10000);
      })
      .catch(() => { alert('Download failed. Please try the GitHub link instead.'); })
      .finally(() => { if (btn) { btn.textContent = 'Download'; btn.disabled = false; } });
  } else {
    window.open(url, '_blank', 'noopener,noreferrer');
  }
}

function applyFilter() {
  const cards = document.querySelectorAll('.tool-card');
  let visible = 0;
  cards.forEach(card => {
    const catOk  = currentCat === 'all' || card.dataset.cat === currentCat;
    const textOk = !searchText || card.dataset.name.includes(searchText);
    const show   = catOk && textOk;
    card.classList.toggle('hidden', !show);
    if (show) visible++;
  });
  document.getElementById('noResults').style.display = visible === 0 ? '' : 'none';
}

document.getElementById('catChips').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (!chip) return;
  currentCat = chip.dataset.cat;
  document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c === chip));
  applyFilter();
});

document.getElementById('searchInput').addEventListener('input', e => {
  searchText = e.target.value.trim().toLowerCase();
  applyFilter();
});

buildCards();

// ── Condensed sticky top bar on scroll (mirrors info-page behavior) ──────────
(function(){
  var top = document.querySelector('.top');
  if (!top) return;
  var anchor = document.querySelector('main') || top.parentElement;
  if (!anchor) return;
  var sentinel = document.createElement('div');
  sentinel.setAttribute('aria-hidden','true');
  sentinel.style.cssText = 'height:1px;width:1px;pointer-events:none;visibility:hidden';
  anchor.insertBefore(sentinel, anchor.firstChild);
  if ('IntersectionObserver' in window){
    var io = new IntersectionObserver(function(entries){
      entries.forEach(function(e){ top.classList.toggle('condensed', !e.isIntersecting); });
    }, { rootMargin: '-60px 0px 0px 0px', threshold: 0 });
    io.observe(sentinel);
  }
})();
</script>
